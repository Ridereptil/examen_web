<div class="container">
  <h1>{{ titulo }}</h1>
  
  <div style="display: flex; gap: 20px;">
    <!-- Formulario -->
    <div style="width: 300px;">
      <app-formulario 
        [productoEdit]="productoParaEditar"
        (guardarProducto)="guardarProducto($event)"
        (cancelarEdicion)="cancelarEdicion()">
      </app-formulario>
    </div>
    
    <!-- Tabla -->
    <div style="flex: 1;">
      <h3>Lista de Productos</h3>
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let producto of productos">
            <td>{{ producto.id }}</td>
            <td>{{ producto.nombre }}</td>
            <td>{{ producto.descripcion }}</td>
            <td>${{ producto.precio }}</td>
            <td>
              <button class="btn" (click)="editarProducto(producto)">Editar</button>
              <button class="btn" (click)="eliminarProducto(producto.id)">Eliminar</button>
            </td>
          </tr>
          <tr *ngIf="productos.length === 0">
            <td colspan="5">No hay productos</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
