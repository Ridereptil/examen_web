<div class="card">
  <div class="card-header">
    <h5>{{ esEdicion ? 'Editar Producto' : 'Nuevo Producto' }}</h5>
  </div>
  <div class="card-body">
    <form #productoForm="ngForm" (ngSubmit)="onSubmit()">
      <div>
        <label class="form-label">Nombre</label>
        <input 
          type="text" 
          [(ngModel)]="producto.nombre"
          name="nombre"
          required
          #nombre="ngModel"
        >
        <div *ngIf="nombre.invalid && nombre.touched" class="text-danger">
          Campo requerido
        </div>
      </div>

      <div>
        <label class="form-label">Descripción</label>
        <textarea 
          [(ngModel)]="producto.descripcion"
          name="descripcion"
          required
          #descripcion="ngModel"
          rows="2"
        ></textarea>
        <div *ngIf="descripcion.invalid && descripcion.touched" class="text-danger">
          Campo requerido
        </div>
      </div>

      <div>
        <label class="form-label">Precio</label>
        <input 
          type="number" 
          [(ngModel)]="producto.precio"
          name="precio"
          required
          min="0.01"
          step="0.01"
          #precio="ngModel"
        >
        <div *ngIf="precio.invalid && precio.touched" class="text-danger">
          Precio válido requerido
        </div>
      </div>

      <div>
        <button type="submit" class="btn-primary">
          {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
        <button *ngIf="esEdicion" type="button" class="btn-secondary" (click)="cancelar()">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
