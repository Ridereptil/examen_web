<form #productoForm="ngForm" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input 
      type="text" 
      class="form-control" 
      [(ngModel)]="producto.nombre"
      name="nombre"
      required
      #nombre="ngModel"
      placeholder="Nombre"
    >
  </div>

  <div class="mb-3">
    <label class="form-label">Descripción</label>
    <textarea 
      class="form-control" 
      [(ngModel)]="producto.descripcion"
      name="descripcion"
      required
      #descripcion="ngModel"
      rows="3"
      placeholder="Descripción"
    ></textarea>
  </div>

  <div class="d-grid">
    <button type="submit" class="btn btn-primary" [disabled]="productoForm.invalid">
      {{ esEdicion ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>

  <div class="mt-2" *ngIf="esEdicion">
    <button type="button" class="btn btn-secondary w-100" (click)="cancelar()">
      Cancelar
    </button>
  </div>
</form>
